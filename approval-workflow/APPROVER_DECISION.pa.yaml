                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(88, 96, 105, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              Height: =22
                              Text: |-
                                =LblSubmitted & ": " & Text(Coalesce(varSelectedTask.Created, Today()), "[$-zh-TW]yyyy/mm/dd")
                              Width: =Parent.Width
                        - LBL_DETAIL_STATUS:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(88, 96, 105, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              Height: =22
                              Text: |-
                                =LblStatus & ": " & Coalesce(varSelectedTask.TaskStatus.Value, "")
                              Width: =Parent.Width
                  - CON_APPROVAL_FORM:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        BorderColor: =RGBA(217, 217, 217, 1)
                        BorderThickness: =1
                        Fill: =RGBA(255, 255, 255, 1)
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        PaddingBottom: =24
                        PaddingLeft: =24
                        PaddingRight: =24
                        PaddingTop: =24
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                      Children:
                        - LBL_SECTION_DECISION:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(32, 38, 44, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Bold
                              Height: =28
                              Size: =16
                              Text: =LblDecision
                              Width: =Parent.Width
                        - RAD_DECISION:
                            Control: Radio
                            Properties:
                              Font: =Font.'Segoe UI'
                              Height: =80
                              Items: =Table({Value:"Approve"}, {Value:"Reject"})
                              OnChange: =Set(varDecision, Self.Selected.Value)
                              Width: =Parent.Width
                        - LBL_SECTION_COMMENT:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(32, 38, 44, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =14
                              Text: =LblComment
                              Width: =Parent.Width
                        - TXT_COMMENT:
                            Control: Classic/TextInput
                            Properties:
                              BorderColor: =RGBA(217, 217, 217, 1)
                              BorderThickness: =1
                              Color: =RGBA(50, 54, 58, 1)
                              Default: =varComment
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledColor: =RGBA(161, 159, 157, 1)
                              DisabledFill: =Self.Fill
                              FocusedBorderThickness: =2
                              Font: =Font.'Segoe UI'
                              Height: =120
                              HintText: =If(varLang = "EN", "Enter your comment...", "請輸入備註...")
                              HoverBorderColor: =RGBA(0, 112, 242, 1)
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              Mode: =TextMode.MultiLine
                              OnChange: =Set(varComment, Self.Text)
                              PaddingLeft: =8
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Size: =12
                              Width: =Parent.Width
                        - LBL_ERROR:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(200, 50, 50, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              Height: =20
                              Size: =12
                              Text: =varSubmitError
                              Visible: =varSubmitError <> ""
                              Width: =Parent.Width
                        - BTN_SUBMIT:
                            Control: Classic/Button
                            Properties:
                              BorderColor: =If(varDecision = "Approve", RGBA(0, 140, 80, 1), If(varDecision = "Reject", RGBA(200, 50, 50, 1), RGBA(0, 112, 242, 1)))
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =0
                              Color: =RGBA(255, 255, 255, 1)
                              DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
                              DisabledColor: =ColorFade(Self.Fill, 90%)
                              DisabledFill: =ColorFade(Self.Fill, 70%)
                              DisplayMode: =If(varIsSubmitting || IsBlank(varDecision), DisplayMode.Disabled, DisplayMode.Edit)
                              Fill: =If(varDecision = "Approve", RGBA(0, 140, 80, 1), If(varDecision = "Reject", RGBA(200, 50, 50, 1), RGBA(0, 112, 242, 1)))
                              Font: =Font.'Segoe UI'
                              Height: =44
                              HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                              HoverColor: =Self.Color
                              HoverFill: =ColorFade(Self.Fill, 20%)
                              OnSelect: |-
                                =If(varDecision = "Reject" && IsBlank(Trim(varComment)),
                                  Set(varSubmitError, LblCommentRequired),
                                  Set(varSubmitError, "");
                                  Set(varIsSubmitting, true);
                                  Patch(CL_ApprovalTasks, varSelectedTask, {TaskStatus: {Value: "Completed"}});
                                  Set(varIsSubmitting, false);
                                  Set(varSuccessVisible, true);
                                  Refresh(CL_ApprovalTasks);
                                  Set(varViewingTask, false);
                                  Set(varSelectedTask, Blank());
                                  Set(varDecision, "");
                                  Set(varComment, "")
                                )
                              PressedBorderColor: =Self.Fill
                              PressedColor: =Self.Fill
                              PressedFill: =If(varDecision = "Approve", RGBA(0, 100, 50, 1), If(varDecision = "Reject", RGBA(150, 30, 30, 1), RGBA(0, 64, 141, 1)))
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Size: =14
                              Text: =LblSubmit
                              Width: =200
                        - SPN_LOADING:
