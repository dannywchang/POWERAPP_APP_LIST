                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Size: =13
                              Text: =LblOpenApplication
                              Width: =Parent.TemplateWidth - 48
                              X: =24
                              Y: =244
            - CON_DECISION:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 0)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutMinHeight: =32
                  LayoutMinWidth: =32
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =varViewingTask
                Children:
                  - CON_TASK_DETAIL_CARD:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        BorderColor: =RGBA(217, 217, 217, 1)
                        BorderThickness: =1
                        Fill: =RGBA(255, 255, 255, 1)
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        PaddingBottom: =20
