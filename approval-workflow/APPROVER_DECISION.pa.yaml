                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(0, 112, 242, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =12
                              Text: =If(varLang = "EN", "Submitting...", "提交中...")
                              Visible: =varIsSubmitting
