                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                      Children:
                        - LBL_DETAIL_TITLE:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(32, 38, 44, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =FontWeight.Bold
                              Height: =28
                              Size: =18
                              Text: =Coalesce(varSelectedTask.Title, "")
                              Width: =Parent.Width
                        - LBL_DETAIL_APPLICANT:
                            Control: Label
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(88, 96, 105, 1)
                              DisabledColor: =RGBA(186, 186, 186, 1)
